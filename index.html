<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7367F0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ALL IN ONE APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="css/mui-style.css">
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <p>Memuat Aplikasi...</p>
    </div>

    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="material-icons-round logo-icon">widgets</span>
                <div>
                    <h1 class="logo-text">ALL IN ONE</h1>
                    <span class="logo-subtitle">Materio MUI</span>
                </div>
            </div>
            <button class="btn-icon" id="closeSidebar"><span class="material-icons-round">close</span></button>
        </div>
        <div class="sidebar-search">
            <span class="material-icons-round search-icon">search</span>
            <input type="text" placeholder="Quick search..." id="sidebarSearch">
        </div>
        <nav class="sidebar-nav" id="sidebarNav">
            <div class="nav-section">UTAMA</div>
            <a class="nav-item active" data-page="dashboard" href="#dashboard">
                <span class="material-icons-round">dashboard</span><span>Dashboard</span>
            </a>
            <div class="nav-section">MENU</div>
            <a class="nav-item" data-page="vault" href="#vault">
                <span class="material-icons-round">password</span><span>Password Vault</span>
            </a>
            <a class="nav-item" data-page="notes" href="#notes">
                <span class="material-icons-round">note_alt</span><span>Notes</span>
            </a>
            <a class="nav-item" data-page="todo" href="#todo">
                <span class="material-icons-round">check_circle</span><span>Todo List</span>
            </a>
            <a class="nav-item" data-page="money" href="#money">
                <span class="material-icons-round">account_balance_wallet</span><span>Money Manager</span>
            </a>
            <a class="nav-item" data-page="travel" href="#travel">
                <span class="material-icons-round">explore</span><span>Travel Tracker</span>
            </a>
            <div class="nav-section">PENGATURAN</div>
            <a class="nav-item" id="customizerBtn" href="#customizer">
                <span class="material-icons-round">settings</span><span>Customizer</span>
            </a>
        </nav>
    </aside>

    <main class="main-content" id="mainContent">
        <header class="app-bar">
            <div class="app-bar-left">
                <button class="btn-icon" id="menuToggle"><span class="material-icons-round">menu</span></button>
                <h2 class="app-bar-title" id="pageTitle">🏠 Dashboard</h2>
            </div>
            <div class="app-bar-right">
                <button class="btn-icon" id="themeToggle"><span class="material-icons-round">dark_mode</span></button>
            </div>
        </header>
        <div class="page-container" id="pageContainer"></div>
        <footer class="footer"><div class="footer-text">© 2024 ALL IN ONE APP</div></footer>
    </main>

    <div class="customizer-overlay" id="customizerOverlay"></div>
    <aside class="customizer-drawer" id="customizer">
        <div class="customizer-header"><h3>Customizer</h3><button class="btn-icon" id="closeCustomizer"><span class="material-icons-round">close</span></button></div>
        <div class="customizer-body">
            <div class="customizer-section">
                <h4>Mode Tema</h4>
                <div class="theme-options">
                    <button class="theme-btn active" data-theme="light"><span>Terang</span></button>
                    <button class="theme-btn" data-theme="dark"><span>Gelap</span></button>
                </div>
            </div>
        </div>
    </aside>

    <button class="fab" id="fabBtn"><span class="material-icons-round">add</span></button>

    <script src="js/modules.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
</body>
  </html>
