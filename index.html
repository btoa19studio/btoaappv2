<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALL IN ONE APP</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Boxicons CSS -->
    <link href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css" rel="stylesheet">
    <!-- Editor.js CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest/dist/editorjs.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- PRELOADER -->
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Memuat Aplikasi...</p>
    </div>

    <!-- OVERLAY SIDEBAR -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- SIDEBAR (GELAP) -->
    <div class="sidebar bg-dark text-white" id="sidebar">
        <div class="sidebar-header p-3 border-bottom border-secondary">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                    <i class='bx bxs-dashboard fs-3 text-primary'></i>
                    <h5 class="m-0 fw-bold">ALL IN ONE</h5>
                </div>
                <button class="btn btn-sm btn-outline-light d-md-none" id="closeSidebar"><i class='bx bx-x'></i></button>
            </div>
        </div>

        <div class="sidebar-nav px-3 py-4">
            <p class="text-secondary text-uppercase small fw-bold mb-3 px-2">Utama</p>
            <a href="#" class="nav-link active d-flex align-items-center gap-2 p-2 mb-2 rounded" data-page="dashboard">
                <i class='bx bxs-home fs-5'></i> <span>Dashboard</span>
            </a>
            <p class="text-secondary text-uppercase small fw-bold mt-4 mb-3 px-2">Menu</p>
            <!-- ✅ PASTIKAN DATA-PAGE="vault" -->
            <a href="#" class="nav-link d-flex align-items-center gap-2 p-2 mb-2 rounded" data-page="vault">
                <i class='bx bxs-lock fs-5'></i> <span>Password Vault</span>
            </a>
            <a href="#" class="nav-link d-flex align-items-center gap-2 p-2 mb-2 rounded" data-page="notes">
                <i class='bx bxs-note fs-5'></i> <span>Notes</span>
            </a>
            <a href="#" class="nav-link d-flex align-items-center gap-2 p-2 mb-2 rounded" data-page="todo">
                <i class='bx bxs-check-circle fs-5'></i> <span>Todo List</span>
            </a>
            <a href="#" class="nav-link d-flex align-items-center gap-2 p-2 mb-2 rounded" data-page="money">
                <i class='bx bxs-wallet fs-5'></i> <span>Money Manager</span>
            </a>
            <a href="#" class="nav-link d-flex align-items-center gap-2 p-2 mb-2 rounded" data-page="travel">
                <i class='bx bxs-map fs-5'></i> <span>Travel Tracker</span>
            </a>

            <p class="text-secondary text-uppercase small fw-bold mt-4 mb-3 px-2">Pengaturan</p>
            <a href="#" class="nav-link d-flex align-items-center gap-2 p-2 mb-2 rounded" id="customizerBtn">
                <i class='bx bxs-cog fs-5'></i> <span>Customizer</span>
            </a>
            <a href="#" class="nav-link d-flex align-items-center gap-2 p-2 mb-2 rounded" id="logoutBtn" style="color: #dc3545;">
                <i class='bx bx-log-out fs-5'></i> <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content bg-white" id="mainContent">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-3 py-2 d-none" id="appHeader">
            <div class="d-flex align-items-center gap-3 w-100">
                <button class="btn btn-icon text-dark d-md-none" id="menuToggle"><i class='bx bx-menu fs-3'></i></button>
                <button class="btn btn-icon text-dark d-none d-md-block me-2" id="sidebarToggle"><i class='bx bx-menu fs-3'></i></button>
                <h5 class="m-0 fw-bold text-dark" id="pageTitle">🏠 Dashboard</h5>
                <div class="ms-auto d-flex align-items-center gap-2 position-relative">
                    <button class="btn btn-icon text-dark" id="themeToggle"><i class='bx bx-moon fs-4'></i></button>
                    
                    <div class="dropdown">
                        <button class="btn btn-link p-0 border-0 dropdown-toggle" type="button" id="profileDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="avatar rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 38px; height: 38px; font-weight: 600;" id="userAvatar">A</div>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 rounded-3 p-0" style="min-width: 220px; overflow: hidden;" aria-labelledby="profileDropdownBtn">
                            <li class="p-3 bg-light border-bottom" style="cursor: default;">
                                <div class="d-flex align-items-center gap-3">
                                    <div class="avatar rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; font-weight: 600; font-size: 18px;" id="dropdownAvatar">A</div>
                                    <div>
                                        <div class="fw-bold text-dark" id="dropdownName">Pengguna</div>
                                        <div class="text-muted small text-truncate" id="dropdownEmail" style="max-width: 130px;">email@example.com</div>
                                    </div>
                                </div>
                            </li>
                            <li><hr class="dropdown-divider m-0"></li>
                            <li><a class="dropdown-item py-2 px-3" href="#" id="editProfileBtn"><i class='bx bx-edit-alt me-2'></i> Edit Profil</a></li>
                            <li><a class="dropdown-item py-2 px-3 text-danger" href="#" id="dropdownLogoutBtn"><i class='bx bx-log-out me-2'></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Page Container -->
        <div class="p-4 bg-light" id="pageContainer" style="min-height: calc(100vh - 64px);"></div>
    </div>

    <!-- CUSTOMIZER OFF-CANVAS -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="customizerOffcanvas">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title">Customizer</h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <p class="text-muted small">Ubah tema aplikasi di sini.</p>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-dark theme-btn active" data-theme="light">☀️ Terang</button>
                <button class="btn btn-outline-dark theme-btn" data-theme="dark">🌙 Gelap</button>
            </div>
        </div>
    </div>

    <!-- FAB BUTTON -->
    <button class="btn btn-primary rounded-circle shadow position-fixed bottom-0 end-0 m-4 d-none" id="fabBtn" style="width: 56px; height: 56px; font-size: 24px;">
        <i class='bx bx-plus'></i>
    </button>

    <!-- 🔥 MODAL OVERLAY (UNTUK FORM & BOTTOM SHEET) -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-dialog" id="modalDialog"></div>
    </div>

    <!-- 🔥 TOAST CONTAINER (UNTUK NOTIFIKASI) -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- FIREBASE CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- EDITOR.JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest/dist/editorjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest/dist/header.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@latest/dist/paragraph.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@latest/dist/image.min.js"></script>

    <!-- BOOTSTRAP 5 JS BUNDLE -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- APP SCRIPTS (URUTAN PENTING) -->
    <script src="js/modules.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/editor.js"></script>        <!-- BARU -->
    <script src="js/vault.js"></script>         <!-- BARU -->
    <script src="js/app.js"></script>
</body>
</html>
